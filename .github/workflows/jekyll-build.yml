# 针对 Pavo Studio 自建服务器环境修改的 Jekyll + Gulp 构建脚本
name: Build Jekyll site for manual deployment

on:
  push:
    branches: ["master"] # 确保你的分支名是 master
  workflow_dispatch:      # 允许手动触发按钮

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 安装 Node.js 并处理前端资源 (针对你项目中的 Gulp 工作流)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn' # 自动缓存依赖，加快下次构建速度

      - name: Install dependencies and Build Assets
        run: |
          yarn install
          npm install -g gulp-cli
          # 这里假设你的项目是通过 gulp 来驱动 jekyll 的
          # 如果 gulp 脚本里已经包含了 jekyll build，只需运行这一步
          gulp build || npx gulp build

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # 3. 将生成的 _site 文件夹上传，供你手动下载
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build-site
          path: _site/
          retention-days: 7 # 产物在 GitHub 保留 7 天
