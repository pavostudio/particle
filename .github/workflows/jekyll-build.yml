name: Build Jekyll site for manual deployment

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04 # 使用旧版环境，通常自带 python2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 降低 Node 版本以兼容老旧的 node-sass
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14' # 尝试 14 或 16，Node 20 太新了
          cache: 'yarn'

      # 2. 显式安装 Python 2
      - name: Setup Python 2.7
        uses: actions/setup-python@v5
        with:
          python-version: '2.7'

      - name: Install dependencies
        run: |
          # 强制指定 python 路径给 npm
          npm config set python /usr/bin/python2.7
          yarn install
          npm install -g gulp-cli
          gulp build || npx gulp build

      # 3. 设置 Ruby 运行 Jekyll
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7' # 匹配老项目的 Ruby 版本
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build-site
          path: _site/
