name: Build Jekyll site for manual deployment

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 22.04 环境
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 可以用最新的 Node
          cache: 'yarn'

      - name: Fix Dependencies and Build
        run: |
          # 1. 强制移除会导致 Python 报错的老旧 node-sass
          yarn remove node-sass || npm uninstall node-sass
          
          # 2. 安装现代的 dart-sass (它不需要编译，不会报 python 错)
          yarn add sass --dev || npm install sass --save-dev
          
          # 3. 安装其余依赖
          yarn install
          
          # 4. 执行构建
          npm install -g gulp-cli
          gulp build || npx gulp build

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build-site
          path: _site/
